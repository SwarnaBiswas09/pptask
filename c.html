<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Technology - CSS Exercise</title>
    
    <style>
        /* --- Styles from Image 1 --- */
        h1 {
            color: blue;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 50px;
        }

        #Cl1 {
            color: cornflowerblue;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* --- Styles from Image 3 (Merged into the style block) --- */
        #Cl2 {
            color: brown;

            background-color: rgb(241, 245, 204);
        }

        p {
            font-size: larger;
        }

    <h1 id="Cl1">This is the CSS class</h1>
